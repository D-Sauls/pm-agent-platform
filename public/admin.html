<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#10162e" />
    <title>Capacity Dashboard</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="top-nav">
      <a class="nav-link" href="./signup.html">Sign up</a>
    </header>
    <main class="container">
      <h1>Capacity Dashboard</h1>
      <p class="subtext">Track storage and estimate bandwidth/user capacity.</p>
      <p><a class="nav-link" href="./cms.html">Open CMS Builder</a></p>

      <form id="capacity-form" novalidate>
        <label for="activeUsers">Active users (monthly)</label>
        <input id="activeUsers" type="number" min="0" value="1000" />

        <label for="avgVideoMb">Average video size (MB)</label>
        <input id="avgVideoMb" type="number" min="1" value="45" />

        <label for="viewsPerUserPerMonth">Video views per user/month</label>
        <input id="viewsPerUserPerMonth" type="number" min="0" value="4" />

        <label for="avgStreamMbps">Average stream bitrate (Mbps)</label>
        <input id="avgStreamMbps" type="number" min="0.1" step="0.1" value="1.5" />

        <label for="uplinkMbps">Your server uplink (Mbps)</label>
        <input id="uplinkMbps" type="number" min="1" value="100" />

        <button type="submit">Calculate</button>
      </form>

      <pre id="results" class="results-box">Loading...</pre>
    </main>

    <script src="./atmosphere.js"></script>
    <script src="./pwa.js"></script>
    <script src="./admin.js"></script>
  </body>
</html>
