<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#10162e" />
    <title>Staff Login</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="top-nav">
      <a class="nav-link" href="./signup.html">Sign up</a>
    </header>
    <main class="container">
      <h1>Login</h1>
      <p class="subtext">Welcome back to staff onboarding</p>

      <form id="login-form" novalidate>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required />

        <label for="password">Password</label>
        <div class="password-row">
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
            minlength="8"
          />
          <button id="toggle-password" type="button" class="secondary-btn">Show</button>
        </div>
        <small>Use the same credentials you created on Sign up.</small>

        <button type="submit">Login</button>
      </form>

      <p id="status" role="status" aria-live="polite"></p>
    </main>

    <script src="./atmosphere.js"></script>
    <script src="./pwa.js"></script>
    <script src="./login.js"></script>
  </body>
</html>
