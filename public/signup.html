<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#10162e" />
    <title>Staff Signup</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <header class="top-nav">
      <a class="nav-link" href="./login.html">Login</a>
    </header>
    <main class="container">
      <h1>Create Account</h1>
      <p class="subtext">Restaurant staff onboarding signup</p>

      <form id="signup-form" novalidate>
        <label for="username">Username</label>
        <input
          id="username"
          name="username"
          type="text"
          autocomplete="username"
          required
          minlength="2"
          maxlength="30"
        />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required />

        <label for="password">Password</label>
        <div class="password-row">
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="new-password"
            required
            minlength="8"
          />
          <button id="toggle-password" type="button" class="secondary-btn">Show</button>
        </div>
        <small>Password must be at least 8 characters.</small>

        <button type="submit">Sign up</button>
      </form>

      <div class="divider">or</div>

      <button id="google-signup" type="button" class="google-btn">
        <span class="google-icon" aria-hidden="true">
          <svg viewBox="0 0 48 48" width="18" height="18" focusable="false">
            <path
              fill="#FFC107"
              d="M43.611 20.083H42V20H24v8h11.303C33.656 32.657 29.19 36 24 36c-6.627 0-12-5.373-12-12S17.373 12 24 12c3.059 0 5.844 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.27 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"
            />
            <path
              fill="#FF3D00"
              d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.844 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.27 4 24 4c-7.682 0-14.417 4.337-17.694 10.691z"
            />
            <path
              fill="#4CAF50"
              d="M24 44c5.166 0 9.86-1.977 13.409-5.197l-6.19-5.238C29.146 35.091 26.715 36 24 36c-5.17 0-9.623-3.317-11.283-7.946l-6.522 5.025C9.434 39.556 16.618 44 24 44z"
            />
            <path
              fill="#1976D2"
              d="M43.611 20.083H42V20H24v8h11.303c-.792 2.237-2.231 4.166-4.084 5.565.001-.001 6.19 5.238 6.19 5.238C36.971 39.201 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"
            />
          </svg>
        </span>
        <span>Sign up with Google</span>
      </button>
      <small id="google-help">Add your Google Client ID in frontend JS and server env first.</small>

      <p id="status" role="status" aria-live="polite"></p>
    </main>

    <script src="./atmosphere.js"></script>
    <script src="./pwa.js"></script>
    <script src="./signup.js"></script>
  </body>
</html>
