<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Segoe UI, sans-serif;
        background: #f6fbff;
        color: #1d3557;
      }
      article {
        max-width: 420px;
        padding: 24px;
        border: 1px solid #d9e2ec;
        border-radius: 20px;
        background: white;
      }
    </style>
  </head>
  <body>
    <article>
      <h1>You're offline</h1>
      <p>The app shell is still available. Downloaded lessons and cached policies will continue to work until you reconnect.</p>
    </article>
  </body>
</html>
